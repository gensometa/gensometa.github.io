<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乗換アラーム</title>
  <meta name="description" content="目的地を乗換案内アプリからコピペするだけ。電車を降りるべき駅に近づくと自動でアラームが鳴る乗換アラームアプリ">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .app-icon {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      margin: 0 auto 1.5rem;
      display: block;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
      letter-spacing: -0.01em;
    }

    .tagline {
      font-size: 1rem;
      color: #6e6e73;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      margin-bottom: 2.5rem;
      text-align: left;
    }

    .feature {
      background: #fff;
      border-radius: 12px;
      padding: 0.875rem 1.125rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      font-size: 0.9rem;
      color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .feature-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 1.8rem;
      text-align: center;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
      padding: 0.9rem 1.5rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .store-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .store-btn:active {
      transform: scale(0.97);
      opacity: 0.75;
    }

    .btn-ios {
      background: #000;
      color: #fff;
    }

    .btn-android {
      background: #01875f;
      color: #fff;
    }

    .btn-text {
      text-align: left;
    }

    .btn-label {
      font-size: 0.68rem;
      opacity: 0.75;
      font-weight: 400;
      display: block;
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .btn-store-name {
      font-size: 1rem;
      font-weight: 700;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: #aeaeb2;
    }

    footer a {
      color: #aeaeb2;
      text-decoration: none;
    }

    footer a:hover {
      color: #6e6e73;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="icon.png" alt="乗換アラーム アイコン" class="app-icon">
    <h1>乗換アラーム</h1>
    <p class="tagline">目的地を乗換案内アプリからコピペするだけ。<br>降りる駅に近づくと自動でアラーム</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">📍</span>
        <span>ルートをコピペ or よく行く目的地をあらかじめ登録しておくことで監視します</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔔</span>
        <span>降車駅に近づくとアラームで通知</span>
      </div>
      <div class="feature">
        <span class="feature-icon">😴</span>
        <span>うっかり寝過ごしを防止</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🚌</span>
        <span>電車・バス問わずどこでも使える</span>
      </div>
    </div>

    <div class="store-buttons">
      <a href="https://apps.apple.com/jp/app/%E4%B9%97%E6%8F%9B%E3%82%A2%E3%83%A9%E3%83%BC%E3%83%A0/id6758363756"
        class="store-btn btn-ios">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
          <path
            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
        </svg>
        <div class="btn-text">
          <span class="btn-label">App Storeからダウンロード</span>
          <span class="btn-store-name">App Store</span>
        </div>
      </a>

      <a href="https://play.google.com/store/apps/details?id=com.trainalarm.app&pcampaignid=web_share"
        class="store-btn btn-android">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
          <path
            d="M3.18 23.76c.3.17.64.22.99.14l12.48-7.14-2.79-2.79L3.18 23.76zM.54 1.96C.2 2.3 0 2.83 0 3.5v17c0 .67.2 1.2.54 1.54l.08.08 9.53-9.53v-.22L.62 1.88l-.08.08zm20.09 8.28l-2.68-1.54-3.05 3.05 3.05 3.05 2.7-1.56c.77-.44.77-1.56-.02-2zM4.17.24L16.65 7.38l-2.79 2.79L3.18.24c.36-.08.71-.03.99.14V.24z" />
        </svg>
        <div class="btn-text">
          <span class="btn-label">Google Playで手に入れよう</span>
          <span class="btn-store-name">Google Play</span>
        </div>
      </a>
    </div>

    <footer>
      <a href="/privacy-policy/">プライバシーポリシー</a>
    </footer>
  </div>
</body>

</html>
